<script>
const API = "https://script.google.com/macros/s/AKfycbwKf_IZiL2p4ttuOvUL5ClZQFQ316vQFiv19QSXzLE438g3iaAUvW9iPHhU3odn1fV9TA/exec";

function confirmar(event) {
  event.preventDefault();

  let nome = document.getElementById("nome").value;
  let whatsapp = document.getElementById("whatsapp").value;

  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nome: nome,
      whatsapp: whatsapp
    })
  })
  .then(() => {

    // 👇 MENSAGEM BONITA (substitui o alert)
    document.querySelector(".card").innerHTML = `
      <h2>🎉 Presença confirmada!</h2>
      <p style="margin-top:10px;">
        Obrigado, ${nome}!<br>
        Você já está participando do sorteio 👀
      </p>

      <p style="margin-top:15px;">
        📅 23 de maio<br>
        ⏰ A partir das 8h<br>
        📍 Vila Jacuí
      </p>

      <a href="https://wa.me/5511963919384?text=${encodeURIComponent(`Oi! Eu (${nome}) confirmei presença na Feira Delas 🌿`)}" 
         style="display:block;margin-top:20px;background:#25d366;color:white;padding:12px;border-radius:10px;text-decoration:none;">
         Entrar no WhatsApp
      </a>
    `;

  })
  .catch(() => {
    alert("Erro ao confirmar. Tenta de novo.");
  });
}
</script>
